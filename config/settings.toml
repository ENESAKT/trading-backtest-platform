# === Quant Engine Ana Konfigürasyon Dosyası ===

[project]
name = "quant_engine"
version = "0.1.0"
description = "VİOP/BIST Algoritmik Trading ve Yüksek Hızlı Backtest Motoru"

[database]
type = "duckdb"
data_dir = "./data"
# db_path kaldırıldı — data_dir'den otomatik türetiliyor (CFG-4)

[data_pipeline]
# Veri çekme ayarları
default_source = "yfinance"
# Yahoo Finance'ta BIST hisseleri .IS soneki ile çağrılır
ticker_suffix = ".IS"
# Delta fetch — sadece eksik günleri çek
enable_delta_fetch = true
# Varsayılan geçmiş veri başlangıcı
default_start_date = "2015-01-01"
# Paralel indirme iş parçacığı sayısı
max_workers = 4
# Varsayılan zaman dilimi
default_timeframe = "1d"
# Başarısız isteklerde tekrar deneme
retry_count = 3
retry_delay_seconds = 1.0
# HTTP istek zaman aşımı (saniye)
request_timeout_seconds = 30.0

[backtest]
# Başlangıç sermayesi (TRY)
initial_capital = 100_000.0
# Komisyon oranı (binde 1)
commission_rate = 0.001
# Kayma (slippage) — baz puan
slippage_bps = 5
# Varsayılan zaman dilimi
default_timeframe = "1d"
# Risk yönetimi
max_position_pct = 0.20
max_drawdown_pct = 0.25

[symbols]
# İlk test için BIST30 çekirdek hisseleri
watchlist = [
    "THYAO", "GARAN", "AKBNK", "YKBNK", "ISCTR",
    "KCHOL", "SAHOL", "TUPRS", "EREGL", "BIMAS",
    "ASELS", "SISE", "PGSUS", "TCELL", "TOASO",
    "FROTO", "KOZAL", "ENKAI", "PETKM", "HEKTS",
    "SASA", "TAVHL", "TTKOM", "VESTL", "ARCLK",
    "EKGYO", "DOHOL", "MGROS", "GUBRF", "KRDMD"
]

[logging]
level = "INFO"
log_dir = "./logs"
rotation = "10 MB"

[performance]
# Apple Silicon optimizasyonu
polars_max_threads = 8
numba_parallel = true

[timezone]
# Saat dilimi ayarları (CFG-6)
local = "Europe/Istanbul"
storage = "UTC"
