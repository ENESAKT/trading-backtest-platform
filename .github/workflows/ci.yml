name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile changed production modules
        run: python -m py_compile backend/api/auth_router.py backend/api/payments_router.py backend/payments/stripe_service.py

      - name: Run focused backend tests
        run: python -m pytest tests/unit/test_api_endpoints.py tests/unit/test_auth_guards_payments.py -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend typecheck
        run: cd frontend && npm run typecheck

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run Playwright smoke suite
        run: cd frontend && npm run e2e

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t piyasapilot-api:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t piyasapilot-frontend:ci .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: piyasapilot-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/piyasapilot
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            curl -f http://localhost:8000/api/health || exit 1
