name: CI

on:
  push:
    branches: [main, develop, 'codex/*']
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check backend/ quant_engine/
      - run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm run build

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.api -t piyasapilot-api:ci .
      - run: docker build -f docker/Dockerfile.frontend -t piyasapilot-frontend:ci .
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: piyasapilot-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: piyasapilot-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  smoke:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker-compose.yml up -d --wait
      - run: python scripts/check_deployment_readiness.py --base-url http://localhost:8000 --skip-dns --skip-tls --skip-ws --skip-db
      - if: always()
        run: docker compose -f infra/docker-compose.yml down -v
