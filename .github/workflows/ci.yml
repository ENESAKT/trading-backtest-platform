name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile all production modules
        run: |
          python -m compileall -q backend quant_engine

      - name: Run full unit test suite
        run: python -m pytest tests/unit/ -q --tb=short --ignore=tests/unit/test_binance_ws.py --ignore=tests/unit/test_live_feed.py
        env:
          JWT_SECRET: "ci-test-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          MYSQL_HOST: "localhost"
          MYSQL_PASSWORD: "test"
          APP_ENV: "test"

      - name: Run integration tests (mock-based, no live services)
        run: |
          python -m pytest tests/integration/ -q --tb=short \
            --ignore=tests/integration/test_binance_ws.py \
            -p no:warnings
        env:
          JWT_SECRET: "ci-test-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          APP_ENV: "test"
          PYTEST_ASYNCIO_MODE: "auto"
        continue-on-error: true   # integration testler backend import bağımlılığı nedeniyle skip olabilir

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run frontend typecheck
        run: cd frontend && npm run typecheck

      - name: Build frontend
        run: cd frontend && npm run build -- --emptyOutDir false

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: cd frontend && CI=true npm run e2e -- --pass-with-no-tests

  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: cd mobile/piyasapilot_mobile && flutter pub get

      - name: Flutter analyze
        run: cd mobile/piyasapilot_mobile && flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter test
        run: |
          cd mobile/piyasapilot_mobile
          if [ -d "test" ] && [ "$(find test -name '*_test.dart' -type f | head -1)" ]; then
            flutter test --reporter=expanded
          else
            echo "⚠️ Test dosyası bulunamadı, adım atlanıyor."
          fi

  docker:
    needs: [backend, frontend, flutter]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t piyasapilot-api:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t piyasapilot-frontend:ci .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: piyasapilot-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docker
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_DOMAIN: piyasapilotu.com
      DEPLOY_EMAIL: admin@piyasapilotu.com
    steps:
      - name: Check deployment configuration
        id: deploy_config
        shell: bash
        run: |
          missing=()
          [ -n "$EC2_HOST" ] || missing+=("EC2_HOST")
          [ -n "$EC2_USER" ] || missing+=("EC2_USER")
          [ -n "$EC2_SSH_KEY" ] || missing+=("EC2_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::Missing required GitHub secrets: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        if: ${{ steps.deploy_config.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_DOMAIN="piyasapilotu.com"
            DEPLOY_EMAIL="admin@piyasapilotu.com"
            INSTALL_DIR="/home/ubuntu/piyasapilot"

            sudo mkdir -p "$INSTALL_DIR"
            sudo chown -R "$USER:$USER" "$INSTALL_DIR"

            if [ ! -d "$INSTALL_DIR/.git" ]; then
              tmp_dir="$(mktemp -d)"
              git clone https://github.com/ENESAKT/Backtest.git "$tmp_dir"
              rsync -a --delete \
                --exclude ".env.production" \
                --exclude "infra/certbot/conf/" \
                --exclude "infra/certbot/www/" \
                --exclude "infra/certbot/logs/" \
                --exclude "infra/certbot/work/" \
                "$tmp_dir/" "$INSTALL_DIR/"
              rm -rf "$tmp_dir"
            fi

            cd "$INSTALL_DIR"
            git fetch origin main
            git checkout main
            git pull origin main

            sudo systemctl disable --now nginx || true
            docker rm -f piyasapilot_edge_manual 2>/dev/null || true

            if [ -f .env.production ]; then
              sudo chown "$USER:$USER" .env.production
              chmod 600 .env.production
            fi

            if [ ! -f .env.production ]; then
              echo "HATA: $INSTALL_DIR/.env.production bulunamadı. Sunucuda .env.production.example dosyasından gerçek değerlerle oluştur."
              exit 1
            fi

            if grep -q "BURAYA_YAZ" .env.production; then
              echo "HATA: .env.production içinde BURAYA_YAZ placeholder değerleri kalmış."
              exit 1
            fi

            docker compose --env-file .env.production -f infra/docker-compose.prod.yml config >/tmp/piyasapilot-compose.yml

            if [ ! -f "infra/certbot/conf/live/${DEPLOY_DOMAIN}/fullchain.pem" ]; then
              echo "TLS sertifikası bulunamadı; HTTP bootstrap + certbot akışı çalıştırılıyor."
              DOMAIN="$DEPLOY_DOMAIN" EMAIL="$DEPLOY_EMAIL" bash scripts/deployment/setup_tls.sh
            fi

            docker compose --env-file .env.production -f infra/docker-compose.prod.yml build --no-cache
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml up -d --remove-orphans

            # Watchdog + systemd servisini güncelle (varsa)
            if [ -f scripts/fix_server_stability.sh ]; then
              bash scripts/fix_server_stability.sh || true
            fi

            # Sağlık kontrolü (60 saniye bekle)
            echo "API sağlık kontrolü bekleniyor..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "✅ API sağlıklı"
                break
              fi
              echo "  Bekleniyor... ($i/12)"
              sleep 5
            done
            curl -f http://localhost/api/health || (echo "❌ API hâlâ yanıt vermiyor"; docker compose --env-file .env.production -f infra/docker-compose.prod.yml logs --tail=80 api nginx; exit 1)
