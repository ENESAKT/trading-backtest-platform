# PiyasaPilot izleme altyapısı (Grafana + Prometheus)
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.monitor.yml up -d
# veya: make monitor

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: piyasapilot-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: piyasapilot-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=piyasapilot
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - default

volumes:
  grafana-data:
