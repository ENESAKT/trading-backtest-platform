version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: piyasapilot_nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - external
      - internal

  frontend:
    image: nginx:alpine
    container_name: piyasapilot_frontend
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      # A simple nginx config for SPA fallback in the frontend container
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: piyasapilot_backend
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../.env
    environment:
      - APP_ENV=production
      - STRICT_ENV_VALIDATION=1
      # Kritik değişkenler .env'den okunur; burada açık referans verilmesi
      # docker-compose'un eksik tanımlı değişkeni açıkça uyarmasını sağlar.
      - MYSQL_HOST=${MYSQL_HOST}           # AWS RDS endpoint
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-piyasapilot}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-piyasapilot}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

networks:
  internal:
    internal: true
  external:
