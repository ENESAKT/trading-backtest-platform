# ─── Rate limiting zone tanımları (server bloğu dışında) ─────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=600r/m;
limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=30r/m;

server {
    listen 80;
    server_name piyasapilotu.com www.piyasapilotu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name piyasapilotu.com www.piyasapilotu.com;

    ssl_certificate     /etc/letsencrypt/live/piyasapilotu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/piyasapilotu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Güvenlik Header'ları ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy: XSS etkisini sınırla
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://$host https://$host; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Auth endpointleri — sıkı rate limit ─────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_strict burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Genel API — normal rate limit ───────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=120 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── /status — sadece localhost erişimi ──────────────────────────────────
    location /status {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://api:8000/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── API dokümantasyonu — production'da engelle ───────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 403;
    }

    # ─── WebSocket ────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
