# PiyasaPilot — Prometheus scrape konfigürasyonu
global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/prometheus_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'piyasapilot-gateway'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'piyasapilot-workers'
    static_configs:
      - targets: ['workers:9100']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
