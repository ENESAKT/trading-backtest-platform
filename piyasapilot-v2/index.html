<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiyasaPilot v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">PiyasaPilot</span>
      <span id="symbol-title" class="symbol-title">Bitcoin / USDT (BTCUSDT)</span>
    </div>
    <nav class="topbar-tabs">
      <button class="tab-btn active" data-tab="chart">Grafik</button>
      <button class="tab-btn" data-tab="portfolio">Portföy</button>
      <button class="tab-btn" data-tab="strategy">Strateji</button>
      <button class="tab-btn" data-tab="screener">Tarayıcı</button>
    </nav>
    <div class="topbar-right">
      <span id="last-update" class="upd-green"></span>
      <span id="status-badge" class="status-badge status-offline">BAĞLANTI YOK</span>
    </div>
  </header>

  <!-- ── Layout ─────────────────────────────────────────────────────────── -->
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content"></main>
  </div>

  <link rel="stylesheet" href="/style.css" />
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
