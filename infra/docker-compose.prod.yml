x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ─── NGINX (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: piyasapilot_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-../docker/nginx.prod.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Certbot yeniledikten sonra nginx'in yeni sertifikayı okuyabilmesi için
    # süreç içinde periyodik reload yap. Reload başarısızsa ana nginx süreci
    # düşmez; bir sonraki döngü tekrar dener.
    command: >
      /bin/sh -c "while :; do
        sleep 6h;
        nginx -s reload || true;
      done &
      nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      # HTTP üzerinden /api/health'i kontrol et (container içinde localhost SSL cert'i yok)
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - piyasapilot_prod

  # ─── CERTBOT (SSL sertifika yenileme) ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: piyasapilot_certbot_prod
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Her 12 saatte bir yenileme kontrolü yapar; sertifika 30 günden az kaldıysa yeniler.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - piyasapilot_prod

  # ─── FRONTEND ────────────────────────────────────────────────────────────
  frontend:
    # Çoklu aşamalı (multi-stage) build ile dist hizmeti veren container
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: piyasapilot_frontend_prod
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - piyasapilot_prod

  # ─── BACKEND API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: piyasapilot_api_prod
    env_file:
      - ../.env.production
    environment:
      # Production web startup hafif kalmalı. Finansal tablo harvest'ı büyük
      # MySQL insert'leri üretir; küçük EC2'lerde siteyi boğmaması için ops işi
      # olarak elle açılmadıkça kapalı tut.
      PIYASAPILOT_DISABLE_FINANCIAL_HARVEST: ${PIYASAPILOT_DISABLE_FINANCIAL_HARVEST:-1}
      # Browser-facing market data endpoint'leri API key kullanmaz. Eski/yanlış
      # .env.production değerleri (/api*) grafikleri 401'e düşürmesin.
      API_KEY_PROTECTED_PATHS: /metrics
      REQUIRE_WS_API_KEY: "0"
      # MYSQL_HOST: Compose içi MySQL için 'mysql' (varsayılan).
      # Harici AWS RDS kullanılıyorsa env_file'da veya burada RDS endpoint'i girin.
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - piyasapilot_prod

  # ─── WORKERS / INGESTOR ──────────────────────────────────────────────────
  # FastAPI servisi gerçek zamanlı worker supervisor'ını kendi içinde çalıştırır.
  # Bu standalone servis sadece elle cache ön-doldurma/diagnostic gerektiğinde
  # açılmalı; varsayılan production deploy'da çift veri çekip küçük EC2'yi boğmasın.
  workers:
    profiles:
      - standalone-workers
    build:
      context: ../
      dockerfile: docker/Dockerfile.workers
    container_name: piyasapilot_workers_prod
    env_file:
      - ../.env.production
    environment:
      PIYASAPILOT_DISABLE_FINANCIAL_HARVEST: ${PIYASAPILOT_DISABLE_FINANCIAL_HARVEST:-1}
      API_KEY_PROTECTED_PATHS: /metrics
      REQUIRE_WS_API_KEY: "0"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_started
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    logging: *default-logging
    networks:
      - piyasapilot_prod

  # ─── DATABASES (PRODUCTION ENV) ──────────────────────────────────────────
  
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: pp_clickhouse_prod
    # Portlar sadece internal network — dışarı expose edilmez
    expose:
      - "8123"
      - "9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:?CLICKHOUSE_DB is required}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_backups:/backups
      - ./clickhouse/conf:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piyasapilot_prod

  mysql:
    image: mysql:8.0
    container_name: pp_mysql_prod
    # Port sadece internal network — dışarı expose edilmez
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${MYSQL_DB:?MYSQL_DB is required}
      - MYSQL_USER=${MYSQL_USER:?MYSQL_USER is required}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piyasapilot_prod

  redis:
    image: redis:7-alpine
    container_name: pp_redis_prod
    # Port sadece internal network — dışarı expose edilmez
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - piyasapilot_prod

volumes:
  clickhouse_data:
  clickhouse_backups:
  mysql_data:
  redis_data:
  app_logs:

networks:
  piyasapilot_prod:
    driver: bridge
