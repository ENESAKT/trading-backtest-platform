version: '3.8'

services:
  # ─── NGINX (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: piyasapilot_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS sertifikaları için (Certbot vs entegre edildiyse)
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - piyasapilot_prod

  # ─── FRONTEND ────────────────────────────────────────────────────────────
  frontend:
    # Çoklu aşamalı (multi-stage) build ile dist hizmeti veren container
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: piyasapilot_frontend_prod
    restart: unless-stopped
    networks:
      - piyasapilot_prod

  # ─── BACKEND API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: piyasapilot_api_prod
    env_file:
      - ../.env.production
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - piyasapilot_prod

  # ─── WORKERS / INGESTOR ──────────────────────────────────────────────────
  workers:
    build:
      context: ../
      dockerfile: docker/Dockerfile.workers
    container_name: piyasapilot_workers_prod
    env_file:
      - ../.env.production
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - piyasapilot_prod

  # ─── DATABASES (PRODUCTION ENV) ──────────────────────────────────────────
  
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: pp_clickhouse_prod
    # Portlar sadece internal network — dışarı expose edilmez
    expose:
      - "8123"
      - "9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-piyasapilot}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/conf:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piyasapilot_prod

  mysql:
    image: mysql:8.0
    container_name: pp_mysql_prod
    # Port sadece internal network — dışarı expose edilmez
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DB:-piyasapilot}
      - MYSQL_USER=${MYSQL_USER:-piyasapilot}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-piyasapilot}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piyasapilot_prod

  redis:
    image: redis:7-alpine
    container_name: pp_redis_prod
    # Port sadece internal network — dışarı expose edilmez
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - piyasapilot_prod

volumes:
  clickhouse_data:
  mysql_data:
  redis_data:
  app_logs:

networks:
  piyasapilot_prod:
    driver: bridge
