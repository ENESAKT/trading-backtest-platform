# ─── Mimari Notu ────────────────────────────────────────────────────────────
# Worker'lar (Binance WS + Yahoo poller + BIST poller) varsayılan olarak
# `api` servisi içinde FastAPI lifespan üzerinden çalışır. Bu sayede
# /ws/quotes ve /ws/signals gerçek zamanlı fan-out çalışır.
#
# İsteğe bağlı ayrı `workers` servisi yalnızca SQLite önbelleğini doldurur
# (WS yayını olmadan). Bunu etkinleştirmek için:
#   1. api servisine `PIYASAPILOT_DISABLE_WORKERS: "1"` ekle
#   2. workers servisinin `profiles` satırını kaldır
# Not: Bu modda /ws/quotes ve /ws/signals pasif olur.
#
# Kullanım: `cd infra && docker compose -f docker-compose.yml up -d`
# veya kökten: `make up`
# ────────────────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.0
    container_name: piyasapilot_mysql_dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: metadata
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: piyasapilot-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    environment:
      MYSQL_HOST: piyasapilot_mysql_dev
      MYSQL_PORT: "3306"
      DATABASE_URL: "mysql+pymysql://appuser:apppass@piyasapilot_mysql_dev:3306/metadata"
      MYSQL_URL: "mysql+aiomysql://appuser:apppass@piyasapilot_mysql_dev:3306/metadata"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    mem_limit: 512m

  notifier:
    build:
      context: ../
      dockerfile: docker/Dockerfile.notifier
    container_name: piyasapilot-notifier
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    environment:
      NOTIFY_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    mem_limit: 128m

  nginx:
    image: nginx:alpine
    container_name: piyasapilot-nginx
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m

  # Bağımsız cache-filler (varsayılan profilde kapalı — yukarıdaki notu oku)
  workers:
    build:
      context: ../
      dockerfile: docker/Dockerfile.workers
    container_name: piyasapilot-workers
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped
    mem_limit: 256m
    profiles:
      - split  # `docker compose --profile split up` ile etkinleştir

volumes:
  data:
  mysql_data:
