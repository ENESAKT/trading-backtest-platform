# PiyasaPilot — Yerel Test Ortamı
# Kullanım: cd infra && docker-compose -f docker-compose.local.yml --env-file ../.env.production up --build
# Erişim: http://localhost  (frontend), http://localhost/api/health (backend)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

services:
  # ─── NGINX (HTTP only — no SSL for local) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pp_nginx_local
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pp_local

  # ─── FRONTEND ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: pp_frontend_local
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pp_local

  # ─── BACKEND API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: pp_api_local
    env_file:
      - ../.env.production
    environment:
      API_KEY_PROTECTED_PATHS: /metrics
      REQUIRE_WS_API_KEY: "0"
      PIYASAPILOT_DISABLE_FINANCIAL_HARVEST: "1"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pp_local

  # ─── CLICKHOUSE ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: pp_clickhouse_local
    expose:
      - "8123"
      - "9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    volumes:
      - clickhouse_local_data:/var/lib/clickhouse
      - ../infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pp_local

  # ─── MYSQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pp_mysql_local
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_local_data:/var/lib/mysql
      - ../infra/mysql/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pp_local

  # ─── REDIS ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pp_redis_local
    expose:
      - "6379"
    volumes:
      - redis_local_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pp_local

volumes:
  clickhouse_local_data:
  mysql_local_data:
  redis_local_data:

networks:
  pp_local:
    driver: bridge
