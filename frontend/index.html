<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiyasaPilot v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <!-- ── Market ticker ───────────────────────────────────────────────────── -->
  <div id="market-ticker" aria-label="Canlı piyasa özeti">
    <div class="ticker-label">Canlı Piyasa</div>
    <div class="ticker-track">
      <span><b>XU100</b><i>10.864,20</i><em class="pos">+0,42%</em></span>
      <span><b>VAKBN</b><i>31,66</i><em class="pos">+1,02%</em></span>
      <span><b>AKBNK</b><i>73,20</i><em class="neg">-0,68%</em></span>
      <span><b>ASELS</b><i>142,80</i><em class="pos">+0,91%</em></span>
      <span><b>BTCUSDT</b><i>68.420</i><em class="pos">+1,18%</em></span>
      <span><b>USDTRY</b><i>32,18</i><em class="neutral">+0,06%</em></span>
    </div>
  </div>

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo"><span class="logo-mark">P</span><strong>Piyasa Pilotu</strong><small>Terminal</small></span>
      <span id="symbol-title" class="symbol-title">Bitcoin / USDT (BTCUSDT)</span>
    </div>
    <nav class="topbar-tabs">
      <button class="tab-btn active" data-tab="chart"><span class="tab-code">1</span><span>Grafik</span></button>
      <button class="tab-btn" data-tab="portfolio"><span class="tab-code">2</span><span>Portföy</span></button>
      <button class="tab-btn" data-tab="strategy"><span class="tab-code">3</span><span>Strateji</span></button>
      <button class="tab-btn" data-tab="screener"><span class="tab-code">4</span><span>Tarayıcı</span></button>
      <button class="tab-btn" data-tab="signals"><span class="tab-code">5</span><span>Sinyaller</span></button>
      <button class="tab-btn" data-tab="education"><span class="tab-code">6</span><span>Eğitimler</span></button>
      <button class="tab-btn" data-tab="financials"><span class="tab-code">7</span><span>Mali Analiz</span></button>
    </nav>
    <div class="topbar-right">
      <span id="last-update" class="upd-green"></span>
      <span id="status-badge" class="status-badge status-offline">BAĞLANTI YOK</span>
      <button id="theme-panel-toggle" class="theme-panel-toggle btn btn-sm btn-outline-warning" type="button" aria-expanded="false" aria-controls="theme-panel">Ayar</button>
    </div>
  </header>

  <section id="theme-panel" class="theme-panel card shadow-lg" aria-label="Tema ayarları" hidden>
    <div class="theme-panel-head">
      <strong>PiyasaPilot Görünüm</strong>
      <button id="theme-panel-close" class="btn-close" type="button" aria-label="Kapat"></button>
    </div>
    <div class="theme-row">
      <span>Tema</span>
      <div class="segmented" role="group" aria-label="Tema seçimi">
        <button type="button" data-theme-choice="dark" class="btn btn-sm btn-warning active">Koyu</button>
        <button type="button" data-theme-choice="light" class="btn btn-sm btn-outline-secondary">Açık</button>
      </div>
    </div>
    <div class="theme-row">
      <span>Vurgu</span>
      <div class="swatches" role="group" aria-label="Renk seçimi">
        <button type="button" data-accent-choice="amber" class="active" style="--swatch:#ffb020" aria-label="Sarı"></button>
        <button type="button" data-accent-choice="green" style="--swatch:#00c875" aria-label="Yeşil"></button>
        <button type="button" data-accent-choice="cyan" style="--swatch:#00d4ff" aria-label="Cyan"></button>
        <button type="button" data-accent-choice="purple" style="--swatch:#b78bff" aria-label="Mor"></button>
        <button type="button" data-accent-choice="red" style="--swatch:#ff4757" aria-label="Kırmızı"></button>
      </div>
    </div>
  </section>

  <!-- ── Layout ─────────────────────────────────────────────────────────── -->
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content"></main>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
