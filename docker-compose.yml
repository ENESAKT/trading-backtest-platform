version: "3.9"

# ─── Mimari Notu ────────────────────────────────────────────────────────────
# Worker'lar (Binance WS + Yahoo poller + BIST poller) varsayılan olarak
# `api` servisi içinde FastAPI lifespan üzerinden çalışır. Bu sayede
# /ws/quotes ve /ws/signals gerçek zamanlı fan-out çalışır.
#
# İsteğe bağlı ayrı `workers` servisi yalnızca SQLite önbelleğini doldurur
# (WS yayını olmadan). Bunu etkinleştirmek için:
#   1. api servisine `PIYASAPILOT_DISABLE_WORKERS: "1"` ekle
#   2. workers servisinin `profiles` satırını kaldır
# Not: Bu modda /ws/quotes ve /ws/signals pasif olur.
# ────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: piyasapilot-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m

  notifier:
    build:
      context: .
      dockerfile: Dockerfile.notifier
    container_name: piyasapilot-notifier
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    mem_limit: 128m

  nginx:
    image: nginx:alpine
    container_name: piyasapilot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./piyasapilot-v2/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m

  # Bağımsız cache-filler (varsayılan profilde kapalı — yukarıdaki notu oku)
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: piyasapilot-workers
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 256m
    profiles:
      - split  # `docker compose --profile split up` ile etkinleştir

volumes:
  data:
