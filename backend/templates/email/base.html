<!doctype html>
<html lang="tr" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiyasaPilot</title>
</head>
<body style="margin:0;padding:0;background-color:#0f1117;color:#e2e8f0;font-family:'Segoe UI',Inter,Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f1117;padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:#171b24;border:1px solid #2a3040;border-radius:8px;overflow:hidden;">
        <!-- Header -->
        <tr><td style="padding:24px 32px;border-bottom:2px solid #ffb020;background-color:#141820;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="font-size:22px;font-weight:700;color:#ffb020;letter-spacing:0.5px;">
                &#9670; PiyasaPilot
              </td>
              <td align="right" style="font-size:12px;color:#64748b;">
                Finansal Terminal
              </td>
            </tr>
          </table>
        </td></tr>
        <!-- Content -->
        <tr><td style="padding:32px;color:#e2e8f0;line-height:1.7;font-size:15px;">
          {% block content %}{% endblock %}
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding:20px 32px;border-top:1px solid #2a3040;background-color:#141820;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="font-size:11px;color:#64748b;line-height:1.5;">
                PiyasaPilot yatırım tavsiyesi vermez.<br>
                Gerçek emir gönderimi desteklenmez.
              </td>
              <td align="right" style="font-size:11px;color:#64748b;">
                <a href="{{ base_url }}" style="color:#ffb020;text-decoration:none;">piyasapilot.com</a>
              </td>
            </tr>
          </table>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
